version: '3.8'

services:

  brand-app:
    build: .
    container_name: brand-app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    networks:
      - sentiment-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - n8n-data:/home/node/.n8n
      - ./data:/home/node/.n8n-files/data
    networks:
      - sentiment-network
    depends_on:
      - brand-app
      - ollama


  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports: 
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sentiment-network

networks:
  sentiment-network:
    driver: bridge

volumes:
  n8n-data:
  ollama-data:
